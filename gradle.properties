# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# Fix for JdkImageTransform / jlink error on some Windows systems
# This tells AGP to use the JDK directly instead of creating a custom image
android.jdk.category=jdk

# Limit parallel workers to reduce memory pressure on systems with many cores
org.gradle.workers.max=4
